services:
  # ... (existing services from docker-compose.yml)

  prometheus:
    image: prom/prometheus:v2.50
    container_name: zynkly-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/alerts.yml:/etc/prometheus/rules/alerts.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    restart: unless-stopped
    networks:
      - zynkly-net

  grafana:
    image: grafana/grafana:11.0
    container_name: zynkly-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana:/etc/grafana/provisioning
    restart: unless-stopped
    networks:
      - zynkly-net

  loki:
    image: grafana/loki:3.0
    container_name: zynkly-loki
    ports:
      - "3100:3100"
    volumes:
      - loki-data:/loki
    restart: unless-stopped
    networks:
      - zynkly-net

  promtail:
    image: grafana/promtail:3.0
    container_name: zynkly-promtail
    volumes:
      - /var/log:/var/log
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    restart: unless-stopped
    networks:
      - zynkly-net

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15
    container_name: zynkly-postgres-exporter
    environment:
      DATA_SOURCE_NAME: postgresql://zynkly:zynkly_pass@postgres:5432/zynkly?sslmode=disable
    ports:
      - "9187:9187"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - zynkly-net

  redis-exporter:
    image: oliver006/redis_exporter:v1.55
    container_name: zynkly-redis-exporter
    environment:
      REDIS_ADDR: redis://redis:6379
    ports:
      - "9121:9121"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - zynkly-net